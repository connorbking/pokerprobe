server {
    listen 80;
    listen [::]:80;
    server_name grlnofp8.pokerprobe.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grlnofp8.pokerprobe.com;

    ssl_certificate     /etc/ssl/cloudflare/pokerprobe.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/pokerprobe.com.key;

    # Cookieless session assets only (not Default.aspx)
    location ~* ^/myrtille/\(S\([^)/]+\)\)/(css|js|img|handlers|popups|node_modules)/ {
        rewrite ^/myrtille/\(S\([^)/]+\)\)/(.+)$ /Myrtille/$1 break;
        proxy_pass http://10.80.30.139:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* ^/Myrtille/\(S\([^)/]+\)\)/(css|js|img|handlers|popups|node_modules)/ {
        rewrite ^/Myrtille/\(S\([^)/]+\)\)/(.+)$ /Myrtille/$1 break;
        proxy_pass http://10.80.30.139:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ASP.NET HTML uses /Myrtille/css/... (capital M) — required on Linux nginx
    location /Myrtille/ {
        proxy_pass http://10.80.30.139:80/Myrtille/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_redirect http://10.80.30.139/ https://$host/;
        proxy_redirect http://10.80.30.139/Myrtille/ https://$host/Myrtille/;
        proxy_cookie_path / /Myrtille/;
        proxy_cookie_flags ~ secure samesite=none;
    }

    location /myrtille/ {
        proxy_pass http://10.80.30.139:80/myrtille/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_redirect http://10.80.30.139/ https://$host/;
        proxy_redirect http://10.80.30.139/myrtille/ https://$host/myrtille/;
        proxy_cookie_path / /myrtille/;
        proxy_cookie_flags ~ secure samesite=none;
    }

    location = / {
        return 302 /myrtille/;
    }

    location = /myrtille {
        return 302 /myrtille/;
    }

    location = /Myrtille {
        return 302 /Myrtille/;
    }
}
