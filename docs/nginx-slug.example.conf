# One desktop subdomain → Myrtille (same pattern as daid.pokerprobe.com / Proxmox)
#
#   https://grlnofp8.pokerprobe.com/myrtille
#        → server_name grlnofp8.pokerprobe.com
#        → location /myrtille { proxy_pass http://10.80.30.139:80; }
#
#   sudo cp docs/nginx-slug.example.conf /etc/nginx/sites-available/grlnofp8.pokerprobe.com
#   sudo sed -i 's/SLUG/grlnofp8/g' /etc/nginx/sites-available/grlnofp8.pokerprobe.com
#   sudo ln -sf /etc/nginx/sites-available/grlnofp8.pokerprobe.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name SLUG.pokerprobe.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SLUG.pokerprobe.com;

    ssl_certificate     /etc/ssl/cloudflare/pokerprobe.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/pokerprobe.com.key;

    access_log /var/log/nginx/myrtille-SLUG.access.log;
    error_log  /var/log/nginx/myrtille-SLUG.error.log;

    # SLUG.pokerprobe.com/myrtille → Win11 Myrtille
    location /myrtille {
        proxy_pass http://10.80.30.139:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_hide_header X-Frame-Options;
        proxy_redirect http://10.80.30.139/ https://$host/;
        proxy_redirect http://10.80.30.139/myrtille/ https://$host/myrtille/;
        add_header Content-Security-Policy "frame-ancestors https://www.pokerprobe.com https://pokerprobe.com" always;
    }

    location = / {
        return 302 /myrtille/;
    }
}
