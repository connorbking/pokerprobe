# Desktop subdomains ONLY → Myrtille (use when www/connorking/daid are elsewhere)
#
#   https://grlnofp8.pokerprobe.com/myrtille
#        → server_name ~^[a-z0-9]{8}\.pokerprobe\.com$
#        → location /myrtille { proxy_pass http://10.80.30.139:80; }
#
# If this still redirects to connorking.com, use docs/nginx-slug.example.conf instead.
# See docs/NGINX-DESKTOP-ROUTING.md.
#
#   sudo cp docs/nginx-pokerprobe-desktop.conf /etc/nginx/sites-available/pokerprobe-desktop
#   sudo ln -sf /etc/nginx/sites-available/pokerprobe-desktop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# --- DESKTOP → MYRTILLE (HTTP) ----------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name ~^[a-z0-9]{8}\.pokerprobe\.com$;

    access_log /var/log/nginx/myrtille.access.log;
    error_log  /var/log/nginx/myrtille.error.log;

    location /myrtille {
        proxy_pass http://10.80.30.139:80;
        proxy_http_version 1.1;
        proxy_set_header Host 10.80.30.139;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors https://www.pokerprobe.com https://pokerprobe.com" always;
    }

    location = / {
        return 302 /myrtille/;
    }
}

# --- DESKTOP → MYRTILLE (HTTPS) ---------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^[a-z0-9]{8}\.pokerprobe\.com$;

    ssl_certificate     /etc/ssl/cloudflare/pokerprobe.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/pokerprobe.com.key;

    access_log /var/log/nginx/myrtille.access.log;
    error_log  /var/log/nginx/myrtille.error.log;

    location /myrtille {
        proxy_pass http://10.80.30.139:80;
        proxy_http_version 1.1;
        proxy_set_header Host 10.80.30.139;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors https://www.pokerprobe.com https://pokerprobe.com" always;
    }

    location = / {
        return 302 /myrtille/;
    }
}
