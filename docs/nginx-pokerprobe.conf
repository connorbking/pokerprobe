# PokerProbe nginx site config — www + apex only
#
#   sudo cp docs/nginx-pokerprobe.conf /etc/nginx/sites-available/pokerprobe
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo ln -sf /etc/nginx/sites-available/pokerprobe /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Common nginx -t errors:
#   duplicate default_server  → disable other sites: ls /etc/nginx/sites-enabled/
#   cannot load certificate   → ls -la /etc/ssl/cloudflare/pokerprobe.com.*
#
# Desktop / Myrtille subdomains: use docs/nginx-slug.example.conf (separate site file).

# HTTP — apex + www
server {
    listen 80;
    listen [::]:80;
    server_name pokerprobe.com www.pokerprobe.com;
    return 301 https://www.pokerprobe.com$request_uri;
}

# HTTPS — apex → www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pokerprobe.com;

    ssl_certificate     /etc/ssl/cloudflare/pokerprobe.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/pokerprobe.com.key;

    return 301 https://www.pokerprobe.com$request_uri;
}

# HTTPS — www (PHP site)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pokerprobe.com;

    ssl_certificate     /etc/ssl/cloudflare/pokerprobe.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/pokerprobe.com.key;

    root  /var/www/pokerprobe;
    index index.php index.html;

    access_log /var/log/nginx/pokerprobe.access.log;
    error_log  /var/log/nginx/pokerprobe.error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize = 100M \n post_max_size=100M";
    }

    location ~ /\.ht {
        deny all;
    }
}
